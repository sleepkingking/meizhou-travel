<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>梅州嘉园户外</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/vendor/supabase.min.js"></script>
</head>
<body>
  <div id="app">
    <main id="content"><div style="text-align:center;padding:40px;color:#999;">页面加载中...</div></main>
  </div>
  <script>
    window.onerror = function(msg, url, line) {
      document.getElementById('content').innerHTML = '<div class="empty"><div class="icon">❌</div><p>JS错误</p><p style="font-size:12px;color:#e8553d;">' + msg + '</p><p style="font-size:10px;color:#999;">' + (url||'').split('/').pop() + ':' + line + '</p></div>';
    };
  </script>

  <!-- 基础库 -->
  <script src="js/supabase.js"></script>
  <!-- 组件 -->
  <script src="js/components/tour-card.js"></script>
  <script src="js/components/image-upload.js"></script>
  <script src="js/components/nav.js"></script>
  <!-- 页面 -->
  <script src="js/pages/home.js"></script>
  <script src="js/pages/tours.js"></script>
  <script src="js/pages/tour-detail.js"></script>
  <script src="js/pages/contact.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/admin-login.js"></script>
  <script src="js/pages/admin-list.js"></script>
  <script src="js/pages/admin-edit.js"></script>
  <script src="js/pages/admin-settings.js"></script>
  <!-- 主应用 -->
  <script src="js/app.js"></script>
</body>
</html>
